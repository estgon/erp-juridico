<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Jurídico Pro - Gestão Total</title>
    <style>
        /* 1. VARIÁVEIS DE CORES DINÂMICAS E MODO ESCURO */
        :root {
            --primary-color: #1d3557;    /* Editável via seletor */
            --secondary-color: #457b9d;
            --accent-color: #e63946;
            --bg-body: #e9ecef;
            --bg-container: #ffffff;
            --bg-input: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --border-color: #ced4da;
            --bg-tab: #f8f9fa;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --bg-input: #2d2d2d;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --border-color: #444444;
            --bg-tab: #252525;
        }

        /* 2. RESET E LAYOUT BASE */
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-body); padding: 20px; margin: 0; color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; background: var(--bg-container); border-radius: 10px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); overflow: hidden; }
        
        /* 3. HEADER E TEMAS */
        .app-header { background-color: var(--primary-color); color: white; padding: 30px 20px; text-align: center; position: relative; }
        .app-header h1 { margin: 0; font-size: 26px; font-weight: 600; }
        .app-header p { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }
        
        .theme-controls { position: absolute; top: 15px; right: 20px; display: flex; gap: 12px; align-items: center; }
        #colorPicker { cursor: pointer; border: 2px solid white; border-radius: 50%; width: 25px; height: 25px; background: none; padding: 0; }
        .theme-btn { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .theme-btn:hover { background: rgba(255,255,255,0.3); }

        /* 4. TABS E NAVEGAÇÃO */
        .tabs { display: flex; background-color: var(--bg-tab); border-bottom: 2px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; font-size: 15px; font-weight: bold; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .tab-btn:hover { background-color: rgba(0,0,0,0.05); }
        .tab-btn.active { background-color: var(--bg-container); color: var(--primary-color); border-bottom: 4px solid var(--primary-color); }

        /* 5. FORMULÁRIOS E GRID */
        .tab-content { padding: 35px; display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .opcoes-container { background: var(--bg-tab); padding: 25px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .opcoes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; color: var(--text-main); margin-bottom: 8px; font-size: 13px; text-transform: uppercase; }
        .form-group input, .form-group select { 
            padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); 
            background-color: var(--bg-input); color: var(--text-main); font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

        /* 6. TABELAS DE RESULTADOS */
        .table-responsive { max-height: 450px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--bg-container); }
        th { background-color: var(--primary-color); color: white; position: sticky; top: 0; z-index: 10; padding: 14px; text-align: left; font-size: 12px; text-transform: uppercase; }
        .th-prazos { background-color: var(--accent-color); }
        td { padding: 14px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        tr:hover { background-color: rgba(0,0,0,0.03); }
        .secao-titulo { margin: 30px 0 10px; font-size: 18px; font-weight: bold; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }

        /* 7. BOTÕES E UI */
        .btn-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 8px; }
        .btn-principal { background-color: var(--primary-color); }
        .btn-pesquisar { background-color: #2a9d8f; }
        .btn-limpar { background-color: #6c757d; }
        .btn-editar { background-color: #e9c46a; color: #1d3557; padding: 6px 10px; border-radius: 4px; }
        .btn-excluir { background-color: var(--accent-color); padding: 6px 10px; border-radius: 4px; }
        .acoes-td { white-space: nowrap; text-align: right; width: 100px; }

        /* 8. MODAL E LOADER */
        .loader { color: var(--accent-color); font-weight: bold; text-align: center; margin: 20px 0; display: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(3px); }
        .modal-box { background: var(--bg-container); padding: 35px; border-radius: 12px; max-width: 420px; width: 90%; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="theme-controls">
            <input type="color" id="colorPicker" onchange="mudarCorDestaque(this.value)" title="Cor de Destaque">
            <button class="theme-btn" onclick="toggleDarkMode()">🌓 Modo Escuro</button>
        </div>
        <h1>Sistema de Gestão Jurídica</h1>
        <p>Controle Integrado de Processos e Prazos</p>
    </div>

    <div class="tabs">
    <button class="tab-btn active" onclick="abrirAba('aba-registo', this)">📝 Novo Registo</button>
    <button class="tab-btn" onclick="abrirAba('aba-consulta', this)">🔍 Consulta</button>
    <button class="tab-btn" onclick="abrirAba('aba-todos', this); carregarTudo()">📊 Todos os Registos</button>
</div>

    <div id="aba-registo" class="tab-content active">
        <div class="opcoes-container">
            <div class="form-group" style="max-width: 250px; margin-bottom: 25px;">
                <label>Onde gravar?</label>
                <select id="tabela" onchange="alternarCampos()">
                    <option value="Planilha1">📋 Planilha 1 (Processos)</option>
                    <option value="Planilha2">⏳ Planilha 2 (Prazos)</option>
                </select>
            </div>
            <div id="campos"></div>
        </div>
        <div class="btn-row">
            <button class="btn btn-limpar" onclick="resetarFormulario()">❌ Cancelar</button>
            <button id="btnPrincipal" class="btn btn-principal" onclick="enviar()">💾 Guardar Dados</button>
        </div>
        <p id="status" class="loader">A comunicar com o Google... ⏳</p>
    </div>

    <div id="aba-consulta" class="tab-content">
        <div class="opcoes-container">
            <div style="display: flex; gap: 12px;">
                <input type="text" id="busca" style="flex:1" placeholder="Pesquisar por nome, número ou qualquer termo...">
                <button class="btn btn-pesquisar" onclick="buscar()">🔎 Pesquisar</button>
            </div>
        </div>
        <p id="statusBusca" class="loader">A cruzar informações relacionais... ⏳</p>
        <div id="resultadoBusca">
            <p style="text-align:center; color:var(--text-muted); padding: 40px 0;">Introduza um termo acima para iniciar a pesquisa.</p>
        </div>
    </div>
<div id="aba-todos" class="tab-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--primary-color); margin: 0;">Base de Dados Completa</h2>
        <button class="btn btn-pesquisar" onclick="carregarTudo()" style="padding: 8px 15px; font-size: 12px;">🔄 Atualizar Lista</button>
    </div>
    <p id="statusTodos" class="loader">A carregar base de dados... ⏳</p>
    <div id="listaCompleta"></div>
</div></div>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle" style="margin-top:0">Aviso</h3>
        <p id="modalMessage" style="margin-bottom:30px; line-height:1.5;"></p>
        <button class="btn btn-principal" style="width:100%; justify-content:center;" onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbydeT5M0ZOUjr3RzvJ5ulJ5TSpZ9ibhFKavsbIheWdih5K5tCkfV5Hr2tnF0DtJX3Gf6g/exec";
    
    let processosEncontrados = [];
    let prazosEncontrados = [];
    let modoEdicao = false;
// Função para verificar se há internet
    function estaOnline() {
        return navigator.onLine;
    }

    // Tentar sincronizar dados do cache sempre que a internet voltar
    window.addEventListener('online', () => {
        atualizarStatusConexao();
        tentarSincronizar();
    });
    window.addEventListener('offline', atualizarStatusConexao);

    function atualizarStatusConexao() {
        const status = estaOnline();
        const header = document.querySelector('.app-header p');
        if (status) {
            header.innerHTML = "SISTEMA ONLINE 🟢";
            header.style.color = "#a8dadc";
        } else {
            header.innerHTML = "MODO OFFLINE (Dados serão guardados localmente) 🔴";
            header.style.color = "#ffb703";
        }
    }

    async function enviar() {
        const tab = document.getElementById('tabela').value;
        const loader = document.getElementById('status');
        
        let dados = {};
        if (tab === "Planilha1") {
            dados = { id: document.getElementById('idp').value, pro: document.getElementById('proc').value, rec: document.getElementById('reclamante').value, dem: document.getElementById('demanda').value, rda: document.getElementById('reclamada').value, esc: document.getElementById('escritorio').value };
        } else {
            dados = { idp: document.getElementById('idprazo').value, pro: document.getElementById('proc2').value, dat: document.getElementById('data').value, ati: document.getElementById('atividade').value, sta: document.getElementById('status_prazo').value, obs: document.getElementById('obs').value };
        }

        const pacote = { acao: modoEdicao ? "atualizar" : "salvar", dados, planilha: tab };

        // VERIFICAÇÃO DE INTERNET ANTES DE ENVIAR
        if (!estaOnline()) {
            salvarNoCache(pacote);
            mostrarModal("Modo Offline", "Sem internet. O registo foi guardado no seu computador e será enviado automaticamente quando a ligação voltar.");
            resetarFormulario();
            return;
        }

        loader.style.display = "block";
        try {
            const res = await fetch(URL_API, { method: "POST", body: JSON.stringify(pacote) });
            const json = await res.json();
            loader.style.display = "none";
            mostrarModal("Sucesso", json.mensagem);
            resetarFormulario();
        } catch (e) {
            // Se o fetch falhar mesmo parecendo online (erro de servidor)
            salvarNoCache(pacote);
            loader.style.display = "none";
            mostrarModal("Erro de Servidor", "O Google não respondeu. Guardámos os dados no cache para tentar mais tarde.");
            resetarFormulario();
        }
    }

    function salvarNoCache(pacote) {
        let fila = JSON.parse(localStorage.getItem('fila_sincronizacao')) || [];
        fila.push(pacote);
        localStorage.setItem('fila_sincronizacao', JSON.stringify(fila));
    }

    async function tentarSincronizar() {
        let fila = JSON.parse(localStorage.getItem('fila_sincronizacao')) || [];
        if (fila.length === 0) return;

        console.log("Sincronizando " + fila.length + " itens pendentes...");
        
        // Enviamos um por um
        for (let i = 0; i < fila.length; i++) {
            try {
                await fetch(URL_API, { method: "POST", body: JSON.stringify(fila[i]) });
                console.log("Item " + i + " sincronizado.");
            } catch (e) {
                console.log("Falha ao sincronizar item " + i + ". Tentarei mais tarde.");
                return; // Para o loop se falhar novamente
            }
        }

        // Se chegou aqui, enviou tudo com sucesso
        localStorage.removeItem('fila_sincronizacao');
        mostrarModal("Sincronização Completa", "Todos os dados guardados offline foram enviados para a Planilha com sucesso!");
    } // --- TEMAS E CORES ---
    function mudarCorDestaque(cor) {
        document.documentElement.style.setProperty('--primary-color', cor);
        localStorage.setItem('temaCor', cor);
    }

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('modoEscuro', isDark);
    }

    function carregarPreferencias() {
        const cor = localStorage.getItem('temaCor');
        const dark = localStorage.getItem('modoEscuro');
        if (cor) {
            document.documentElement.style.setProperty('--primary-color', cor);
            document.getElementById('colorPicker').value = cor;
        }
        if (dark === 'true') document.body.classList.add('dark-mode');
    }

    // --- NAVEGAÇÃO ---
    function abrirAba(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function alternarCampos() {
        const tab = document.getElementById('tabela').value;
        const div = document.getElementById('campos');
        
        if (tab === "Planilha1") {
            div.innerHTML = `
                <input type="hidden" id="idp">
                <div class="opcoes-grid">
                    <div class="form-group"><label>Nº Processo</label><input id="proc" placeholder="Ex: 0001234-2026"></div>
                    <div class="form-group"><label>Reclamante</label><input id="reclamante"></div>
                    <div class="form-group"><label>Demanda</label><input id="demanda"></div>
                    <div class="form-group"><label>Reclamada</label><input id="reclamada"></div>
                    <div class="form-group"><label>Escritório</label><input id="escritorio"></div>
                </div>`;
        } else {
            div.innerHTML = `
                <input type="hidden" id="idprazo">
                <div class="opcoes-grid">
                    <div class="form-group">
                        <label>Nº Processo</label>
                        <input id="proc2" list="listaProcessos" placeholder="Pesquisar vinculado..." onfocus="carregarSugestoes()">
                        <datalist id="listaProcessos"></datalist>
                    </div>
                    <div class="form-group"><label>Data Limite</label><input type="date" id="data"></div>
                    <div class="form-group"><label>Atividade</label><input id="atividade" placeholder="Ex: Contestação"></div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status_prazo">
                            <option value="Pendente">🟡 Pendente</option>
                            <option value="Em Andamento">🔵 Em Andamento</option>
                            <option value="Concluído">🟢 Concluído</option>
                            <option value="Urgente">🔴 Urgente</option>
                            <option value="Aguardando Terceiro">🟠 Aguardando</option>
                            <option value="Cancelado">⚪ Cancelado</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Observações</label><input id="obs"></div>
                </div>`;
        }
    }

    // --- COMUNICAÇÃO GOOGLE ---
    async function carregarSugestoes() {
        const datalist = document.getElementById('listaProcessos');
        if (datalist.children.length > 0) return;
        try {
            const res = await fetch(`${URL_API}?acao=getLista`);
            const json = await res.json();
            if (json.lista) {
                datalist.innerHTML = "";
                json.lista.forEach(num => {
                    let opt = document.createElement('option');
                    opt.value = num;
                    datalist.appendChild(opt);
                });
            }
        } catch (e) { console.error("Erro datalist:", e); }
    }

    async function enviar() {
        const tab = document.getElementById('tabela').value;
        const loader = document.getElementById('status');
        loader.style.display = "block";

        let dados = {};
        if (tab === "Planilha1") {
            dados = { id: document.getElementById('idp').value, pro: document.getElementById('proc').value, rec: document.getElementById('reclamante').value, dem: document.getElementById('demanda').value, rda: document.getElementById('reclamada').value, esc: document.getElementById('escritorio').value };
        } else {
            dados = { idp: document.getElementById('idprazo').value, pro: document.getElementById('proc2').value, dat: document.getElementById('data').value, ati: document.getElementById('atividade').value, sta: document.getElementById('status_prazo').value, obs: document.getElementById('obs').value };
        }

        try {
            const res = await fetch(URL_API, { method: "POST", body: JSON.stringify({ acao: modoEdicao ? "atualizar" : "salvar", dados, planilha: tab }) });
            const json = await res.json();
            loader.style.display = "none";
            mostrarModal("Sucesso", json.mensagem);
            resetarFormulario();
            if (modoEdicao) buscar();
        } catch (e) {
            loader.style.display = "none";
            mostrarModal("Erro", "Falha na gravação.");
        }
    }

    async function buscar() {
        const termo = document.getElementById('busca').value;
        const loader = document.getElementById('statusBusca');
        const divRes = document.getElementById('resultadoBusca');
        
        loader.style.display = "block";
        divRes.innerHTML = "";

        try {
            const res = await fetch(`${URL_API}?termo=${encodeURIComponent(termo)}`);
            const json = await res.json();
            loader.style.display = "none";

            processosEncontrados = json.processos || [];
            prazosEncontrados = json.prazos || [];

            let html = "";
            if (processosEncontrados.length > 0) {
                html += `<div class="secao-titulo">📋 Processos Relacionados (${processosEncontrados.length})</div>
                         <div class="table-responsive"><table>
                         <tr><th>ID</th><th>Reclamante</th><th>Nº Processo</th><th style="text-align:right;">Ações</th></tr>`;
                processosEncontrados.forEach((p, i) => {
                    html += `<tr><td>${p[0]}</td><td>${p[2]}</td><td>${p[4]}</td>
                             <td class="acoes-td">
                                <button class="btn btn-editar" onclick="prepararEdicao(${i}, 'Planilha1')">✏️</button>
                                <button class="btn btn-excluir" onclick="excluirRegisto(${i}, 'Planilha1')">🗑️</button>
                             </td></tr>`;
                });
                html += `</table></div>`;
            }

            if (prazosEncontrados.length > 0) {
                html += `<div class="secao-titulo" style="color:var(--accent-color)">⏳ Prazos do Processo (${prazosEncontrados.length})</div>
                         <div class="table-responsive"><table>
                         <tr><th class="th-prazos">ID</th><th class="th-prazos">Processo</th><th class="th-prazos">Data</th><th class="th-prazos">Status</th><th class="th-prazos" style="text-align:right;">Ações</th></tr>`;
                prazosEncontrados.forEach((p, i) => {
                    let dt = p[2] ? new Date(p[2] + "T12:00:00").toLocaleDateString('pt-BR') : '---';
                    html += `<tr><td>${p[0]}</td><td>${p[1]}</td><td>${dt}</td><td>${p[4]}</td>
                             <td class="acoes-td">
                                <button class="btn btn-editar" onclick="prepararEdicao(${i}, 'Planilha2')">✏️</button>
                                <button class="btn btn-excluir" onclick="excluirRegisto(${i}, 'Planilha2')">🗑️</button>
                             </td></tr>`;
                });
                html += `</table></div>`;
            }

            divRes.innerHTML = html || "<p style='text-align:center; padding:40px;'>Nenhum registo encontrado.</p>";
        } catch (e) {
            loader.style.display = "none";
            mostrarModal("Erro", "Erro na pesquisa relacional.");
        }
    }

    function prepararEdicao(i, tab) {
        const p = tab === "Planilha1" ? processosEncontrados[i] : prazosEncontrados[i];
        modoEdicao = true;
        abrirAba('aba-registo', document.querySelectorAll('.tab-btn')[0]);
        document.getElementById('tabela').value = tab;
        document.getElementById('tabela').disabled = true;
        alternarCampos();

        if (tab === "Planilha1") {
            document.getElementById('idp').value = p[0];
            document.getElementById('proc').value = p[4];
            document.getElementById('reclamante').value = p[2];
            document.getElementById('demanda').value = p[1];
            document.getElementById('reclamada').value = p[3];
            document.getElementById('escritorio').value = p[5];
        } else {
            document.getElementById('idprazo').value = p[0];
            document.getElementById('proc2').value = p[1];
            document.getElementById('data').value = p[2];
            document.getElementById('atividade').value = p[3];
            document.getElementById('status_prazo').value = p[4];
            document.getElementById('obs').value = p[5];
        }
        document.getElementById('btnPrincipal').innerHTML = "🔄 Atualizar Dados";
    }

    async function excluirRegisto(i, tab) {
        const p = tab === "Planilha1" ? processosEncontrados[i] : prazosEncontrados[i];
        if (!confirm(`Deseja apagar o registo ${p[0]}?`)) return;
        try {
            const res = await fetch(URL_API, { method: "POST", body: JSON.stringify({ acao: "excluir", id: p[0], planilha: tab }) });
            const json = await res.json();
            mostrarModal("Aviso", json.mensagem);
            buscar();
        } catch (e) { mostrarModal("Erro", "Falha ao excluir."); }
    }

    // --- AUXILIARES ---
    function resetarFormulario() {
        modoEdicao = false;
        document.getElementById('tabela').disabled = false;
        alternarCampos();
        document.getElementById('btnPrincipal').innerHTML = "💾 Guardar Dados";
    }

    function mostrarModal(t, m) { 
        document.getElementById('modalTitle').innerText = t; 
        document.getElementById('modalMessage').innerText = m; 
        document.getElementById('customModal').style.display = 'flex'; 
    }
    function fecharModal() { document.getElementById('customModal').style.display = 'none'; }

    window.onload = () => { 
    carregarPreferencias(); 
    atualizarStatusConexao(); 
    alternarCampos(); 
    tentarSincronizar(); 
};
</script>
</body>
</html>
